services:
  mykeyvault:
    image: vaultwarden/server:latest
    container_name: mykeyvault
    restart: unless-stopped
    ports:
      - "8222:80"
    volumes:
      - /var/local/mydocker/mykeyvault/data:/data
    environment:
      - SIGNUPS_ALLOWED=false
      - DOMAIN=https://mykeyvault.lan
      - LOG_LEVEL=warn
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-}
    networks:
      - mykeyvault-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  vault-api:
    build:
      context: ./vault-api
    container_name: vault-api
    restart: unless-stopped
    ports:
      - "8223:8000"
    volumes:
      - /var/local/mydocker/compose-files/caddy/caddy-root.crt:/certs/caddy-root.crt:ro
    environment:
      - VAULT_URL=https://mykeyvault.lan
      - NODE_EXTRA_CA_CERTS=/certs/caddy-root.crt
      - VAULT_API_TOKEN=${VAULT_API_TOKEN:-}
      - BW_CLIENTID=${BW_CLIENTID:-}
      - BW_CLIENTSECRET=${BW_CLIENTSECRET:-}
      - BW_PASSWORD=${BW_PASSWORD:-}
    extra_hosts:
      - "mykeyvault.lan:host-gateway"
    depends_on:
      mykeyvault:
        condition: service_healthy
    networks:
      - mykeyvault-net

  # MCP-Server (StreamableHTTP) — zentral, damit die vault_*-Tools ohne SMB-Mount
  # auf jedem Client verfügbar sind. Bearer = ai-rem-api-token (MCP_AUTH_TOKEN);
  # spricht vault-api intern über das compose-Netz an.
  mykeyvault-mcp:
    build:
      context: ./mcp
    image: mykeyvault-mcp:latest
    container_name: mykeyvault-mcp
    restart: unless-stopped
    ports:
      - "3458:3458"
    environment:
      - MCP_TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=3458
      - VAULT_API_URL=http://vault-api:8000
      - VAULT_API_TOKEN=${VAULT_API_TOKEN:-}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN nicht gesetzt — ai-rem-api-token aus dem Vault in die .env schreiben}
    depends_on:
      vault-api:
        condition: service_started
    networks:
      - mykeyvault-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3458/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mykeyvault-net:
    name: mykeyvault-net
